<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Trip Manager — Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --p: #1a3d2b;
      --pd: #122a1e;
      --err: #dc2626;
      --bg: #f5f7f5;
      --card: #fff;
      --text: #1a2e1f;
      --muted: #5a7060;
      --border: #d8e4dc;
      --r: 8px;
      --sh: 0 1px 6px rgba(0, 0, 0, 0.08)
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh
    }

    header {
      background: var(--p);
      color: #fff;
      padding: .85rem 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .22)
    }

    .header-brand {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap
    }

    .header-center {
      text-align: center
    }

    .header-center .class-label {
      font-size: 1.5rem;
      font-weight: 800;
      display: block;
      line-height: 1.1
    }

    .header-center .teacher-label {
      font-size: .82rem;
      opacity: .75;
      display: block;
      margin-top: .1rem
    }

    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1.2rem
    }

    header nav {
      display: flex;
      align-items: center;
      gap: 1.2rem
    }

    nav a {
      color: rgba(255, 255, 255, .78);
      text-decoration: none;
      font-weight: 500;
      font-size: .93rem
    }

    nav a:hover,
    nav a.active {
      color: #fff;
      text-decoration: underline
    }

    .btn-so {
      background: rgba(255, 255, 255, .12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .3);
      border-radius: 5px;
      padding: .32rem .85rem;
      font-size: .87rem;
      font-family: 'Heebo', sans-serif;
      cursor: pointer
    }

    .btn-so:hover {
      background: rgba(255, 255, 255, .22)
    }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem
    }

    .card {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 2rem;
      margin-bottom: 1.5rem
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--p);
      border-bottom: 2px solid var(--border);
      padding-bottom: .75rem
    }

    .tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem
    }

    .tab-btn {
      flex: 1;
      padding: .75rem;
      border: 2px solid var(--border);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      transition: all .2s
    }

    .tab-btn.active {
      background: var(--p);
      border-color: var(--p);
      color: #fff
    }

    .tab-btn:hover:not(.active) {
      border-color: var(--p);
      color: var(--p)
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem
    }

    .form-group {
      margin-bottom: 1.2rem
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: .4rem;
      font-size: .9rem
    }

    .form-group input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      transition: border-color .2s, box-shadow .2s
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--p);
      box-shadow: 0 0 0 3px rgba(26, 61, 43, .12)
    }

    .form-group input.auth-field {
      border-color: var(--p);
      background: #edf5f0
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: .75rem;
      margin-top: .5rem;
      border: none;
      border-radius: 8px;
      background: var(--p);
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s
    }

    .btn-primary:hover {
      background: var(--pd);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26, 61, 43, .25)
    }

    .alert {
      padding: .85rem 1.2rem;
      border-radius: 8px;
      font-weight: 500;
      margin-top: 1rem;
      display: none
    }

    .alert.show {
      display: block;
      animation: fadeIn .3s ease
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    #loginScreen {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 2.2rem 1.6rem;
      text-align: center
    }

    .login-card h2 {
      color: var(--p);
      margin-bottom: .45rem
    }

    .login-card p {
      color: var(--muted);
      margin-bottom: 1rem
    }

    .login-card input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .7rem 1rem;
      text-align: center;
      font-size: 1rem;
      font-family: 'Heebo', sans-serif;
      margin-bottom: .7rem
    }

    #loginError {
      display: none;
      color: var(--err);
      margin-top: .4rem;
      font-size: .9rem
    }

    #dashboard {
      display: none
    }

    @media(max-width:600px) {
      .form-row {
        grid-template-columns: 1fr
      }

      header {
        grid-template-columns: 1fr;
        text-align: center;
        gap: .4rem
      }

      .header-right {
        justify-content: center
      }
    }
  </style>
</head>

<body>
  <section id="loginScreen">
    <div class="login-card">
      <h2>Teacher Login</h2>
      <p>
        Access restricted to teachers only.<br>
        Enter your ID number:
      </p>
      <input type="text" id="loginId" maxlength="9" placeholder="000000000"
        oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn-primary" onclick="login()">Sign In</button>
      <div id="loginError"></div>
    </div>
  </section>

  <div id="dashboard">
    <header>
      <span class="header-brand">Annual Trip Management</span>
      <div class="header-center">
        <span class="class-label" id="headerClass"></span>
        <span class="teacher-label" id="headerTeacher"></span>
      </div>
      <div class="header-right">
        <nav>
          <a href="index.html" class="active">Registration</a>
          <a href="map.html">Live Map</a>
        </nav>
        <button class="btn-so" onclick="logout()">Sign Out</button>
      </div>
    </header>

    <div class="container">
      <div class="tabs">
        <button class="tab-btn active" id="tabTeacher" onclick="switchTab('teacher')">Register Teacher</button>
        <button class="tab-btn" id="tabStudent" onclick="switchTab('student')">Register Student</button>
      </div>

      <div class="card" id="formTeacher">
        <h2>Register New Teacher</h2>
        <form onsubmit="submitTeacher(event)">
          <div class="form-row">
            <div class="form-group"><label>First Name</label><input id="tFirstName" placeholder="Sarah" /></div>
            <div class="form-group"><label>Last Name</label><input id="tLastName" placeholder="Levi" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>ID Number (9 digits)</label><input id="tIdNumber" maxlength="9"
                placeholder="123456789" /></div>
            <div class="form-group"><label>Class</label><input id="tClassName" placeholder="6A" /></div>
          </div>
          <button type="submit" class="btn-primary">Register Teacher</button>
        </form>
        <div class="alert" id="teacherAlert"></div>
      </div>

      <div class="card" id="formStudent" style="display:none">
        <h2>Register New Student</h2>
        <form onsubmit="submitStudent(event)">
          <div class="form-row">
            <div class="form-group"><label>First Name</label><input id="sFirstName" placeholder="Maya" /></div>
            <div class="form-group"><label>Last Name</label><input id="sLastName" placeholder="Cohen" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Student ID Number</label><input id="sIdNumber" maxlength="9"
                placeholder="987654321" /></div>
            <div class="form-group"><label>Class (auto-filled)</label><input id="sClassName" placeholder="Auto-filled"
                readonly /></div>
          </div>
          <button type="submit" class="btn-primary">Register Student</button>
        </form>
        <div class="alert" id="studentAlert"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:5000";
    const $ = id => document.getElementById(id);
    let authId = sessionStorage.getItem("teacherId");
    let teacherClass = sessionStorage.getItem("teacherClass");

    function showAlert(id, msg, type) {
      const el = $(id);
      el.textContent = msg; el.className = `alert alert-${type} show`;
      setTimeout(() => el.className = 'alert', 4000);
    }

    function switchTab(t) {
      $('formTeacher').style.display = t === 'teacher' ? 'block' : 'none';
      $('formStudent').style.display = t === 'student' ? 'block' : 'none';
      $('tabTeacher').className = 'tab-btn' + (t === 'teacher' ? ' active' : '');
      $('tabStudent').className = 'tab-btn' + (t === 'student' ? ' active' : '');
    }

    function logout() {
      sessionStorage.clear();
      $('dashboard').style.display = 'none';
      $('loginScreen').style.display = 'flex';
      $('loginId').value = '';
      authId = null; teacherClass = null;
    }

    function openDashboard() {
      $('loginScreen').style.display = 'none';
      $('dashboard').style.display = 'block';
      if (teacherClass) { $('sClassName').value = teacherClass; $('headerClass').textContent = `Class ${teacherClass}`; }
      if (authId) fetch(`${API}/api/teachers/${authId}`, { headers: { 'X-Teacher-ID': authId } })
        .then(r => r.json()).then(t => { $('headerTeacher').textContent = `${t.first_name} ${t.last_name}`; }).catch(() => { });
    }

    async function login() {
      const id = $('loginId').value.trim();
      const err = $('loginError');
      err.style.display = 'none';
      if (!/^\d{9}$/.test(id)) { err.textContent = 'ID number must be 9 digits'; err.style.display = 'block'; return; }
      try {
        const res = await fetch(`${API}/api/teachers/${id}`, { headers: { 'X-Teacher-ID': id } });
        if (!res.ok) { err.textContent = 'This ID is not registered as a teacher'; err.style.display = 'block'; return; }
        const teacher = await res.json();
        authId = id; teacherClass = teacher.class_name;
        sessionStorage.setItem('teacherId', authId);
        sessionStorage.setItem('teacherClass', teacherClass);
        openDashboard();
      } catch { err.textContent = 'Server connection error'; err.style.display = 'block'; }
    }

    async function submitTeacher(e) {
      e.preventDefault();
      const fn = $('tFirstName').value.trim(), ln = $('tLastName').value.trim(), id = $('tIdNumber').value.trim(), cls = $('tClassName').value.trim();
      if (!fn || !ln) { showAlert('teacherAlert', 'First and last name are required', 'error'); return; }
      if (!/^\d{9}$/.test(id)) { showAlert('teacherAlert', 'ID number must be exactly 9 digits', 'error'); return; }
      if (!cls) { showAlert('teacherAlert', 'Class is required', 'error'); return; }
      const data = { first_name: fn, last_name: ln, id_number: id, class_name: cls };
      try {
        const res = await fetch(`${API}/api/teachers`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const r = await res.json();
        if (res.ok) { showAlert('teacherAlert', 'Teacher registered successfully', 'success'); e.target.reset(); }
        else showAlert('teacherAlert', r.error, 'error');
      } catch { showAlert('teacherAlert', 'Server connection error', 'error'); }
    }

    async function submitStudent(e) {
      e.preventDefault();
      if (!authId) { showAlert('studentAlert', 'Not logged in', 'error'); return; }
      const fn = $('sFirstName').value.trim(), ln = $('sLastName').value.trim(), id = $('sIdNumber').value.trim();
      const cls = teacherClass || $('sClassName').value.trim();
      if (!fn || !ln) { showAlert('studentAlert', 'First and last name are required', 'error'); return; }
      if (!/^\d{9}$/.test(id)) { showAlert('studentAlert', 'Student ID must be exactly 9 digits', 'error'); return; }
      if (!cls) { showAlert('studentAlert', 'Class not available', 'error'); return; }
      const data = { first_name: fn, last_name: ln, id_number: id, class_name: cls };
      try {
        const res = await fetch(`${API}/api/students`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Teacher-ID': authId }, body: JSON.stringify(data) });
        const r = await res.json();
        if (res.ok) { showAlert('studentAlert', 'Student registered successfully', 'success'); e.target.reset(); $('sClassName').value = cls; }
        else showAlert('studentAlert', r.error, 'error');
      } catch { showAlert('studentAlert', 'Server connection error', 'error'); }
    }

    if (authId) openDashboard();
  </script>
</body>

</html>
