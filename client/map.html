<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת ניהול טיול - מפת איכון</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --p:#4f46e5; --pd:#3730a3; --ok:#10b981; --err:#ef4444; --bg:#f1f5f9; --card:#fff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0; --r:12px; --sh:0 4px 24px rgba(0,0,0,0.08); }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:linear-gradient(135deg,var(--p),var(--pd)); color:#fff; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(79,70,229,0.3); }
    header h1 { font-size:1.4rem; font-weight:700; }
    nav a { color:rgba(255,255,255,0.85); text-decoration:none; margin-right:1rem; font-weight:500; }
    nav a.active, nav a:hover { color:#fff; text-decoration:underline; }
    .container { max-width:980px; margin:1.6rem auto; padding:0 1rem; }
    .card { background:var(--card); border-radius:var(--r); box-shadow:var(--sh); padding:1.3rem; margin-bottom:1rem; }
    .card h2 { color:var(--p); font-size:1.12rem; margin-bottom:1rem; padding-bottom:0.6rem; border-bottom:2px solid var(--border); }
    .btn { border:none; border-radius:8px; padding:0.7rem 1.2rem; font-size:0.96rem; font-weight:600; font-family:'Heebo',sans-serif; cursor:pointer; }
    .btn-primary { background:var(--p); color:#fff; } .btn-primary:hover { background:var(--pd); }
    .alert { display:none; margin-top:0.8rem; border-radius:8px; padding:0.7rem 1rem; font-weight:500; }
    .alert.show { display:block; }
    .alert-success { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
    .alert-error { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    #loginScreen { min-height:60vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:430px; background:#fff; border-radius:var(--r); box-shadow:var(--sh); padding:2.2rem 1.6rem; text-align:center; }
    .login-card h2 { color:var(--p); margin-bottom:0.45rem; }
    .login-card p { color:var(--muted); margin-bottom:1rem; }
    .login-card input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:0.7rem 1rem; text-align:center; font-size:1rem; margin-bottom:0.7rem; }
    #loginError { display:none; color:var(--err); margin-top:0.4rem; font-size:0.9rem; }
    .auth-bar { display:none; align-items:center; gap:0.7rem; flex-wrap:wrap; background:#fff; border:1.5px solid var(--border); border-radius:var(--r); box-shadow:var(--sh); padding:0.8rem 1rem; margin-bottom:1rem; }
    .badge { border-radius:20px; padding:0.25rem 0.65rem; font-size:0.82rem; font-weight:600; background:#d1fae5; color:#065f46; }
    .muted { color:var(--muted); font-size:0.9rem; }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--ok); display:inline-block; margin-left:6px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    #mapSection, #distanceSection, #studentsSection { display:none; }
    #map { height:510px; border-radius:var(--r); border:2px solid var(--border); }
    .distance-controls { display:flex; align-items:center; flex-wrap:wrap; gap:0.8rem; margin-bottom:0.5rem; }
    .distance-controls label { font-weight:600; }
    .distance-controls input { width:90px; border:1.5px solid var(--border); border-radius:8px; padding:0.55rem; text-align:center; font-size:1rem; font-family:'Heebo',sans-serif; }
    .student-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:0.8rem; }
    .student-card { border:1.5px solid var(--border); border-radius:10px; background:#fff; padding:0.75rem; cursor:pointer; transition:all .2s; }
    .student-card:hover { transform:translateY(-2px); border-color:var(--p); box-shadow:0 4px 12px rgba(79,70,229,0.15); }
    .student-card.far-alert { border-color:var(--err); background:#fff5f5; }
    .student-card h4 { margin-bottom:0.25rem; }
    .meta { font-size:0.82rem; color:var(--muted); }
    .distance-badge { display:inline-block; margin-top:0.4rem; background:var(--err); color:#fff; border-radius:20px; padding:0.2rem 0.58rem; font-size:0.78rem; font-weight:600; }
    @media(max-width:640px) { header{flex-direction:column;gap:0.4rem} .distance-controls{flex-direction:column;align-items:flex-start} #map{height:430px} }
  </style>
</head>
<body>
  <header>
    <h1>מפת איכון תלמידות</h1>
    <nav>
      <a href="index.html">רישום</a>
      <a href="map.html" class="active">מפת איכון</a>
    </nav>
  </header>

  <div class="container">
    <section id="loginScreen">
      <div class="login-card">
        <h2>כניסה למפת האיכון</h2>
        <p>גישה למורות בלבד. הזיני תעודת זהות:</p>
        <input type="text" id="loginId" maxlength="9" placeholder="000000000"
               oninput="this.value=this.value.replace(/\D/g,'')"
               onkeydown="if(event.key==='Enter') login()" />
        <button class="btn btn-primary" style="width:100%" onclick="login()">כניסה</button>
        <div id="loginError"></div>
      </div>
    </section>

    <section class="auth-bar" id="authBarTop">
      <span>מורה מאומתת:</span>
      <span id="teacherBadge" class="badge"></span>
      <span id="classBadge" class="muted"></span>
      <span style="flex:1"></span>
      <span class="muted"><span class="status-dot"></span><span id="lastUpdate">מחובר</span></span>
      <button class="btn" style="background:#f1f5f9;color:var(--text);font-size:0.85rem" onclick="logout()">יציאה</button>
    </section>

    <section id="mapSection" class="card">
      <h2>מיקומי תלמידות בזמן אמת</h2>
      <div id="map"></div>
    </section>

    <section id="distanceSection" class="card">
      <h2>בדיקת תלמידות שהתרחקו</h2>
      <div class="distance-controls">
        <label for="thresholdKm">סף מרחק (ק"מ):</label>
        <input type="number" id="thresholdKm" value="3" min="0.1" step="0.5" />
        <button class="btn btn-primary" onclick="checkDistance()">בדוק מרחק</button>
      </div>
      <div class="alert" id="distanceAlert"></div>
      <div id="farStudentsContainer" style="display:none;margin-top:1rem">
        <h3 style="color:var(--err);margin-bottom:0.8rem">תלמידות שהתרחקו:</h3>
        <div class="student-list" id="farStudentsList"></div>
      </div>
    </section>

    <section id="studentsSection" class="card">
      <h2>תלמידות הכיתה</h2>
      <div class="student-list" id="studentList"><p class="meta">טוען...</p></div>
    </section>
  </div>

  <script>
    const API = "http://localhost:5000";
    const BOUNDS = { minLat:31.72, maxLat:31.83, minLon:35.15, maxLon:35.29 };
    const BASE = [31.7683, 35.2137];

    let authId = null, teacherClass = null, teacherStudents = [], updateInterval = null;
    let teacherPosition = { lat: BASE[0], lon: BASE[1] };
    let teacherMarker = null;
    const studentPositions = {}, markers = {};

    const map = L.map("map").setView(BASE, 14);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
      subdomains: "abcd", maxZoom: 19
    }).addTo(map);

    const $ = id => document.getElementById(id);

    function show(id, val="block") { $(id).style.display = val; }
    function hide(id) { $(id).style.display = "none"; }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function decToDMS(v) {
      const a = Math.abs(v), d = Math.floor(a), mf = (a - d) * 60, m = Math.floor(mf);
      return { Degrees: String(d), Minutes: String(m), Seconds: String(Math.min(59, Math.round((mf - m) * 60))) };
    }

    function makeIcon(label, color) {
      return L.divIcon({
        className: "",
        html: `<div style="background:${color};color:${color==='white'?'#333':'white'};border:2px solid ${color==='white'?'#ef4444':color};border-radius:6px;padding:3px 8px;font-family:Heebo,sans-serif;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.2)">${label}</div><div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid ${color==='white'?'#ef4444':color};margin:0 auto"></div>`,
        iconAnchor: [40, 40]
      });
    }

    function resetUI() {
      show("loginScreen", "flex");
      ["authBarTop","mapSection","distanceSection","studentsSection","loginError","farStudentsContainer"].forEach(hide);
      $("loginId").value = "";
      $("distanceAlert").className = "alert";
    }

    function openDashboard(teacher) {
      hide("loginScreen");
      show("authBarTop", "flex");
      ["mapSection","distanceSection","studentsSection"].forEach(id => show(id));
      $("teacherBadge").textContent = `✓ ${teacher.first_name} ${teacher.last_name}`;
      $("classBadge").textContent = `| כיתה ${teacherClass}`;
      setTimeout(() => map.invalidateSize(), 100);
    }

    async function login() {
      const id = $("loginId").value.trim();
      const err = $("loginError");
      hide("loginError");
      if (!/^\d{9}$/.test(id)) { err.textContent = "תעודת זהות חייבת להיות 9 ספרות"; show("loginError"); return; }
      try {
        const tres = await fetch(`${API}/api/teachers/${id}`, { headers: { "X-Teacher-ID": id } });
        if (!tres.ok) { err.textContent = "תעודת זהות זו אינה רשומה כמורה"; show("loginError"); return; }
        const teacher = await tres.json();
        authId = id; teacherClass = teacher.class_name;
        const sres = await fetch(`${API}/api/teachers/${id}/students`, { headers: { "X-Teacher-ID": id } });
        teacherStudents = (await sres.json()).students || [];
        initPositions();
        const first = studentPositions[teacherStudents[0]?.id_number];
        teacherPosition = first ? { lat: first.lat + 0.001, lon: first.lon + 0.001 } : { lat: BASE[0], lon: BASE[1] };
        openDashboard(teacher);
        if (updateInterval) clearInterval(updateInterval);
        await updateCycle();
        updateInterval = setInterval(updateCycle, 60000);
      } catch { err.textContent = "שגיאת חיבור לשרת"; show("loginError"); }
    }

    function logout() {
      if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
      authId = teacherClass = null; teacherStudents = [];
      Object.keys(markers).forEach(id => { map.removeLayer(markers[id]); delete markers[id]; });
      if (teacherMarker) { map.removeLayer(teacherMarker); teacherMarker = null; }
      resetUI();
    }

    function initPositions() {
      teacherStudents.forEach((s, i) => {
        if (studentPositions[s.id_number]) return;
        const angle = (i / Math.max(teacherStudents.length, 1)) * Math.PI * 2;
        const r = 0.005 + Math.random() * 0.008;
        studentPositions[s.id_number] = { lat: BASE[0] + r * Math.sin(angle), lon: BASE[1] + r * Math.cos(angle) };
      });
    }

    function jitter(pos, delta) {
      pos.lat = clamp(pos.lat + (Math.random() - 0.5) * delta, BOUNDS.minLat, BOUNDS.maxLat);
      pos.lon = clamp(pos.lon + (Math.random() - 0.5) * delta, BOUNDS.minLon, BOUNDS.maxLon);
    }

    async function updateTeacherLocation() {
      jitter(teacherPosition, 0.0015);
      try {
        const res = await fetch(`${API}/api/location/teacher/position`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Teacher-ID": authId },
          body: JSON.stringify({ Coordinates: { Longitude: decToDMS(teacherPosition.lon), Latitude: decToDMS(teacherPosition.lat) } })
        });
        const r = await res.json();
        if (res.ok && r.teacher_location) { teacherPosition.lat = r.teacher_location.latitude; teacherPosition.lon = r.teacher_location.longitude; }
      } catch {}
      if (teacherMarker) teacherMarker.setLatLng([teacherPosition.lat, teacherPosition.lon]);
      else teacherMarker = L.marker([teacherPosition.lat, teacherPosition.lon], { icon: makeIcon("מורה", "#4f46e5") }).addTo(map);
    }

    async function simulateStudentLocations() {
      for (const s of teacherStudents) {
        const pos = studentPositions[s.id_number];
        if (!pos) continue;
        jitter(pos, 0.002);
        try {
          await fetch(`${API}/api/location`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ID: parseInt(s.id_number, 10), Coordinates: { Longitude: decToDMS(pos.lon), Latitude: decToDMS(pos.lat) }, Time: new Date().toISOString() })
          });
        } catch {}
      }
    }

    async function loadLocations() {
      if (!authId) return;
      try {
        const res = await fetch(`${API}/api/locations`, { headers: { "X-Teacher-ID": authId } });
        if (!res.ok) return;
        const ids = new Set(teacherStudents.map(s => s.id_number.trim()));
        const locs = (await res.json()).filter(l => ids.has(l.id_number.trim()));
        locs.forEach(s => {
          const popup = `<div style="direction:rtl;font-family:Heebo,sans-serif;min-width:160px"><strong>${s.first_name} ${s.last_name}</strong><br/><small>כיתה: ${s.class_name} | ת.ז: ${s.id_number}</small><br/><small>${new Date(s.recorded_at).toLocaleTimeString("he-IL")}</small></div>`;
          if (markers[s.id_number]) { markers[s.id_number].setLatLng([s.latitude, s.longitude]); markers[s.id_number].setPopupContent(popup); }
          else { markers[s.id_number] = L.marker([s.latitude, s.longitude], { icon: makeIcon(`${s.first_name} ${s.last_name}`, "white") }).addTo(map).bindPopup(popup); }
        });
        $("studentList").innerHTML = locs.length
          ? locs.map(s => `<div class="student-card" onclick="flyTo('${s.id_number}')"><h4>${s.first_name} ${s.last_name}</h4><div class="meta">כיתה: ${s.class_name} | ת.ז: ${s.id_number}</div><div class="meta">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</div><div class="meta">${new Date(s.recorded_at).toLocaleTimeString("he-IL")}</div></div>`).join("")
          : '<p class="meta">אין מיקומים זמינים עדיין</p>';
        $("lastUpdate").textContent = `עודכן בשעה ${new Date().toLocaleTimeString("he-IL")}`;
      } catch {}
    }

    async function updateCycle() {
      await updateTeacherLocation();
      await simulateStudentLocations();
      await loadLocations();
    }

    function flyTo(id) { const m = markers[id]; if (m) { map.flyTo(m.getLatLng(), 16, { animate:true, duration:1 }); m.openPopup(); } }

    async function checkDistance() {
      if (!authId) return;
      const threshold = parseFloat($("thresholdKm").value) || 3;
      if (threshold <= 0) { distAlert("סף מרחק חייב להיות גדול מ-0", "error"); return; }
      try {
        const res = await fetch(`${API}/api/location/teacher`, {
          method: "POST", headers: { "Content-Type": "application/json", "X-Teacher-ID": authId },
          body: JSON.stringify({ threshold_km: threshold })
        });
        const data = await res.json();
        if (!res.ok) { distAlert(data.error || "שגיאה בבדיקת המרחק", "error"); return; }
        if (data.teacher_location) {
          if (teacherMarker) teacherMarker.setLatLng([data.teacher_location.latitude, data.teacher_location.longitude]);
          map.flyTo([data.teacher_location.latitude, data.teacher_location.longitude], 13);
        }
        const far = data.far_students || [];
        if (!far.length) { distAlert(`כל התלמידות נמצאות בטווח של ${threshold} ק"מ`, "success"); hide("farStudentsContainer"); return; }
        distAlert(`נמצאו ${far.length} תלמידות שהתרחקו מעבר ל-${threshold} ק"מ`, "error");
        $("farStudentsList").innerHTML = far.map(s => `<div class="student-card far-alert" onclick="flyTo('${s.id_number}')"><h4>${s.first_name} ${s.last_name}</h4><div class="meta">כיתה: ${s.class_name}</div><span class="distance-badge">${s.distance_km} ק"מ</span></div>`).join("");
        show("farStudentsContainer");
      } catch { distAlert("שגיאת חיבור לשרת", "error"); }
    }

    function distAlert(msg, type) {
      const el = $("distanceAlert");
      el.textContent = msg; el.className = `alert alert-${type} show`;
      setTimeout(() => el.className = "alert", 5000);
    }

    resetUI();
  </script>
</body>
</html>
