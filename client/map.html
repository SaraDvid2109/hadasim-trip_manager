<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Trip Manager — Live Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{--p:#1a3d2b;--pd:#122a1e;--err:#dc2626;--bg:#f5f7f5;--card:#fff;--text:#1a2e1f;--muted:#5a7060;--border:#d8e4dc;--r:8px;--sh:0 1px 6px rgba(0,0,0,0.08)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    header{background:var(--p);color:#fff;padding:.85rem 1.5rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.22)}
    .header-brand{font-size:1.1rem;font-weight:700;white-space:nowrap}
    .header-center{text-align:center}
    .header-center .class-label{font-size:1.5rem;font-weight:800;display:block;line-height:1.1}
    .header-center .teacher-label{font-size:.82rem;opacity:.75;display:block;margin-top:.1rem}
    .header-right{display:flex;align-items:center;justify-content:flex-end;gap:1.2rem}
    header nav{display:flex;align-items:center;gap:1.2rem}
    nav a{color:rgba(255,255,255,.78);text-decoration:none;font-weight:500;font-size:.93rem}
    nav a:hover,nav a.active{color:#fff;text-decoration:underline}
    .btn-so{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px;padding:.32rem .85rem;font-size:.87rem;font-family:'Heebo',sans-serif;cursor:pointer}
    .btn-so:hover{background:rgba(255,255,255,.22)}

    .container{max-width:980px;margin:1.6rem auto;padding:0 1rem}
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:1.3rem;margin-bottom:1rem}
    .card h2{color:var(--p);font-size:1.08rem;margin-bottom:1rem;padding-bottom:.55rem;border-bottom:2px solid var(--border)}
    .btn{border:none;border-radius:8px;padding:.7rem 1.2rem;font-size:.96rem;font-weight:600;font-family:'Heebo',sans-serif;cursor:pointer}
    .btn-primary{background:var(--p);color:#fff}
    .btn-primary:hover{background:var(--pd)}
    .alert{display:none;margin-top:.8rem;border-radius:8px;padding:.7rem 1rem;font-weight:500}
    .alert.show{display:block}
    .alert-success{background:#dcfce7;color:#166534;border:1px solid #86efac}
    .alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    #map{height:510px;border-radius:var(--r);border:2px solid var(--border)}
    .distance-controls{display:flex;align-items:center;flex-wrap:wrap;gap:.8rem;margin-bottom:.5rem}
    .distance-controls label{font-weight:600}
    .distance-controls input{width:90px;border:1.5px solid var(--border);border-radius:8px;padding:.55rem;text-align:center;font-size:1rem;font-family:'Heebo',sans-serif}
    .student-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.8rem}
    .student-card{border:1.5px solid var(--border);border-radius:10px;background:#fff;padding:.75rem;cursor:pointer;transition:all .2s}
    .student-card:hover{transform:translateY(-2px);border-color:var(--p);box-shadow:0 4px 12px rgba(26,61,43,.12)}
    .student-card.far-alert{border-color:var(--err);background:#fff5f5}
    .student-card h4{margin-bottom:.25rem}
    .meta{font-size:.82rem;color:var(--muted)}
    .distance-badge{display:inline-block;margin-top:.4rem;background:var(--err);color:#fff;border-radius:20px;padding:.2rem .58rem;font-size:.78rem;font-weight:600}
    @media(max-width:640px){header{grid-template-columns:1fr;text-align:center;gap:.4rem}.header-right{justify-content:center}#map{height:430px}}
  </style>
</head>
<body>
  <header>
    <span class="header-brand">Annual Trip Management</span>
    <div class="header-center">
      <span class="class-label">Class <span id="classLabel">—</span></span>
      <span class="teacher-label" id="teacherLabel"></span>
    </div>
    <div class="header-right">
      <nav>
        <a href="index.html">Registration</a>
        <a href="map.html" class="active">Live Map</a>
      </nav>
      <button class="btn-so" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <section class="card">
      <h2>Student Locations — Real Time</h2>
      <div id="map"></div>
    </section>

    <section class="card">
      <h2>Distance Check</h2>
      <div class="distance-controls">
        <label for="thresholdKm">Threshold (km):</label>
        <input type="number" id="thresholdKm" value="3" min="0.1" step="0.5" />
        <button class="btn btn-primary" onclick="checkDistance()">Check Distance</button>
      </div>
      <div class="alert" id="distanceAlert"></div>
      <div id="farStudentsContainer" style="display:none;margin-top:1rem">
        <h3 style="color:var(--err);margin-bottom:.8rem">Students out of range:</h3>
        <div class="student-list" id="farStudentsList"></div>
      </div>
    </section>

    <section class="card">
      <h2>Class Students</h2>
      <div class="student-list" id="studentList"><p class="meta">Loading...</p></div>
    </section>
  </div>

  <script>
    const authId = sessionStorage.getItem('teacherId');
    const teacherClass = sessionStorage.getItem('teacherClass');
    if (!authId) location.href = 'index.html';

    const API = "http://localhost:5000";
    const BOUNDS = { minLat:31.72, maxLat:31.83, minLon:35.15, maxLon:35.29 };
    const BASE = [31.7683, 35.2137];
    const $ = id => document.getElementById(id);

    let teacherStudents = [], updateInterval = null;
    let teacherPosition = { lat: BASE[0], lon: BASE[1] };
    let teacherMarker = null;
    const studentPositions = {}, markers = {};

    const map = L.map("map").setView(BASE, 14);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
      subdomains: "abcd", maxZoom: 19
    }).addTo(map);

    function makeIcon(color) {
      return L.divIcon({ className: "", iconSize: [22,32], iconAnchor: [11,32], popupAnchor: [0,-34],
        html: `<svg width="22" height="32" viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg"><path d="M11 0C4.9 0 0 4.9 0 11c0 8.3 11 21 11 21s11-12.7 11-21C22 4.9 17.1 0 11 0z" fill="${color}" stroke="rgba(0,0,0,0.18)" stroke-width="1"/><circle cx="11" cy="11" r="4.5" fill="white"/></svg>`
      });
    }

    function decToDMS(v) {
      const a=Math.abs(v), d=Math.floor(a), mf=(a-d)*60, m=Math.floor(mf);
      return { Degrees:String(d), Minutes:String(m), Seconds:String(Math.min(59,Math.round((mf-m)*60))) };
    }

    function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
    function jitter(pos,delta){ pos.lat=clamp(pos.lat+(Math.random()-.5)*delta,BOUNDS.minLat,BOUNDS.maxLat); pos.lon=clamp(pos.lon+(Math.random()-.5)*delta,BOUNDS.minLon,BOUNDS.maxLon); }
    function flyTo(id){ const m=markers[id]; if(m){ map.flyTo(m.getLatLng(),16,{animate:true,duration:1}); m.openPopup(); } }
    function logout(){ sessionStorage.clear(); if(updateInterval) clearInterval(updateInterval); location.href='index.html'; }

    function distAlert(msg, type) {
      const el = $("distanceAlert");
      el.textContent = msg; el.className = `alert alert-${type} show`;
      setTimeout(() => el.className = "alert", 5000);
    }

    async function updateTeacherLocation() {
      jitter(teacherPosition, 0.0015);
      try {
        const res = await fetch(`${API}/api/location/teacher/position`, {
          method: "POST", headers: { "Content-Type": "application/json", "X-Teacher-ID": authId },
          body: JSON.stringify({ Coordinates: { Longitude: decToDMS(teacherPosition.lon), Latitude: decToDMS(teacherPosition.lat) } })
        });
        const r = await res.json();
        if (res.ok && r.teacher_location) { teacherPosition.lat = r.teacher_location.latitude; teacherPosition.lon = r.teacher_location.longitude; }
      } catch {}
      if (teacherMarker) teacherMarker.setLatLng([teacherPosition.lat, teacherPosition.lon]);
      else teacherMarker = L.marker([teacherPosition.lat, teacherPosition.lon], { icon: makeIcon("#1a56db") }).addTo(map);
    }

    async function loadLocations() {
      try {
        const res = await fetch(`${API}/api/locations`, { headers: { "X-Teacher-ID": authId } });
        if (!res.ok) return;
        const ids = new Set(teacherStudents.map(s => s.id_number.trim()));
        const locs = (await res.json()).filter(l => ids.has(l.id_number.trim()));
        locs.forEach(s => {
          const popup = `<div style="font-family:Heebo,sans-serif;min-width:150px"><strong>${s.first_name} ${s.last_name}</strong><br/><small>ID: ${s.id_number}</small><br/><small>${new Date(s.recorded_at).toLocaleTimeString('en-GB')}</small></div>`;
          if (markers[s.id_number]) { markers[s.id_number].setLatLng([s.latitude,s.longitude]); markers[s.id_number].setPopupContent(popup); }
          else markers[s.id_number] = L.marker([s.latitude,s.longitude],{icon:makeIcon("#dc2626")}).addTo(map).bindPopup(popup);
        });
        $("studentList").innerHTML = locs.length
          ? locs.map(s => `<div class="student-card" onclick="flyTo('${s.id_number}')"><h4>${s.first_name} ${s.last_name}</h4><div class="meta">ID: ${s.id_number}</div><div class="meta">${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}</div></div>`).join("")
          : '<p class="meta">No locations available yet</p>';
      } catch {}
    }

    async function checkDistance() {
      const threshold = parseFloat($("thresholdKm").value) || 3;
      if (threshold <= 0) { distAlert("Threshold must be greater than 0", "error"); return; }
      try {
        const res = await fetch(`${API}/api/location/teacher`, {
          method: "POST", headers: { "Content-Type": "application/json", "X-Teacher-ID": authId },
          body: JSON.stringify({ threshold_km: threshold })
        });
        const data = await res.json();
        if (!res.ok) { distAlert(data.error || "Distance check failed", "error"); return; }
        if (data.teacher_location && teacherMarker) teacherMarker.setLatLng([data.teacher_location.latitude, data.teacher_location.longitude]);
        const far = data.far_students || [];
        if (!far.length) { distAlert(`All students are within ${threshold} km`, "success"); $("farStudentsContainer").style.display="none"; return; }
        distAlert(`${far.length} student(s) are beyond ${threshold} km`, "error");
        $("farStudentsList").innerHTML = far.map(s => `<div class="student-card far-alert" onclick="flyTo('${s.id_number}')"><h4>${s.first_name} ${s.last_name}</h4><div class="meta">Class: ${s.class_name}</div><span class="distance-badge">${s.distance_km} km</span></div>`).join("");
        $("farStudentsContainer").style.display = "block";
      } catch { distAlert("Server connection error", "error"); }
    }

    // Init
    if (teacherClass) $('classLabel').textContent = teacherClass;
    setTimeout(() => map.invalidateSize(), 100);
    fetch(`${API}/api/teachers/${authId}`, { headers: { 'X-Teacher-ID': authId } })
      .then(r => r.json()).then(t => { $('teacherLabel').textContent = `${t.first_name} ${t.last_name}`; }).catch(() => {});

    (async () => {
      try { const res = await fetch(`${API}/api/teachers/${authId}/students`, { headers: {'X-Teacher-ID': authId} }); teacherStudents = (await res.json()).students || []; } catch {}
      teacherStudents.forEach((s,i) => {
        const angle = (i/Math.max(teacherStudents.length,1))*Math.PI*2, r=0.005+Math.random()*0.008;
        studentPositions[s.id_number] = { lat: BASE[0]+r*Math.sin(angle), lon: BASE[1]+r*Math.cos(angle) };
      });
      const first = studentPositions[teacherStudents[0]?.id_number];
      teacherPosition = first ? { lat:first.lat+0.001, lon:first.lon+0.001 } : { lat:BASE[0], lon:BASE[1] };

      async function updateCycle() {
        jitter(teacherPosition, 0.0015);
        await updateTeacherLocation();
        for (const s of teacherStudents) {
          const pos = studentPositions[s.id_number]; if(!pos) continue;
          jitter(pos, 0.002);
          try { await fetch(`${API}/api/location`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ID:parseInt(s.id_number,10), Coordinates:{Longitude:decToDMS(pos.lon),Latitude:decToDMS(pos.lat)}, Time:new Date().toISOString()}) }); } catch {}
        }
        await loadLocations();
      }

      await updateCycle();
      updateInterval = setInterval(updateCycle, 60000);
    })();
  </script>
</body>
</html>
